# ===========================================================
# Conexiaa docker-compose.yml
# Starts the full stack: PostgreSQL (pgvector), Redis,
# FastAPI backend, and Next.js frontend.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in real keys
#      (or rely on the defaults below for local demo).
#   2. Docker and docker-compose installed.
#
# Start: docker-compose up --build
# ===========================================================

version: "3.9"

services:
  # ─── PostgreSQL with pgvector extension ──────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: conexiaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-conexiaa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-conexiaa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - conexiaa-network

  # ─── Redis (cache / background tasks) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: conexiaa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - conexiaa-network

  # ─── FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conexiaa-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Overrides / defaults if .env not set
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-conexiaa}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      FEATHERLESS_API_URL: ${FEATHERLESS_API_URL:-https://api.featherless.ai/v1}
      ZERNIO_CLIENT_ID: ${ZERNIO_CLIENT_ID:-}
      ZERNIO_CLIENT_SECRET: ${ZERNIO_CLIENT_SECRET:-}
      ZERNIO_REDIRECT_URI: ${ZERNIO_REDIRECT_URI:-http://localhost:3000/channels/callback}
    volumes:
      - ./data:/app/data           # mount the data directory for FAISS / CSV
      - ./backend:/app             # live reload (optional; remove for production)
    networks:
      - conexiaa-network

  # ─── Next.js Frontend ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: conexiaa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws/chat
    networks:
      - conexiaa-network

# ─── Named volumes ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Shared network ─────────────────────────────────────────
networks:
  conexiaa-network:
    driver: bridge

# ===========================================================
# Testing
# ===========================================================
# 1. Copy .env.example to .env and customize if you have
#    real API keys; otherwise defaults work for local demo.
# 2. Build and start all services:
#       docker-compose up --build
# 3. The frontend will be at http://localhost:3000
#    The backend API docs at http://localhost:8000/docs
# 4. To run the data ingestion inside the backend container:
#       docker exec -it conexiaa-backend python scripts/ingest_datasets.py
#    (Make sure the data/raw folder is populated first.)
# 5. Test the live chat, channel switching, RAG highlights
#    and ElevenLabs voice playback using the demo buttons.